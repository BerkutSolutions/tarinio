apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --port
            - "0"
            - --tls-port
            - "6379"
            - --tls-cert-file
            - /etc/redis-tls/tls.crt
            - --tls-key-file
            - /etc/redis-tls/tls.key
            - --tls-ca-cert-file
            - /etc/redis-tls/ca.crt
            - --tls-auth-clients
            - "no"
            - --protected-mode
            - "yes"
            - --user
            - default off
            - --user
            - waf-coordination on >$(REDIS_PASSWORD) ~ha:* +auth +ping +get +set +del +pexpire +eval +select
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/redis-tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-tls
          secret:
            secretName: tarinio-lab-redis-tls
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-control-plane-only
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: control-plane
      ports:
        - protocol: TCP
          port: 6379

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: waf-runtime-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: tarinio-control-plane:lab
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CONTROL_PLANE_HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_HTTP_ADDR
            - name: CONTROL_PLANE_AUTH_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_AUTH_ISSUER
            - name: CONTROL_PLANE_BOOTSTRAP_ADMIN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_BOOTSTRAP_ADMIN_ENABLED
            - name: CONTROL_PLANE_BOOTSTRAP_ADMIN_ID
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_BOOTSTRAP_ADMIN_ID
            - name: CONTROL_PLANE_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_BOOTSTRAP_ADMIN_USERNAME
            - name: CONTROL_PLANE_BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_BOOTSTRAP_ADMIN_EMAIL
            - name: CONTROL_PLANE_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: CONTROL_PLANE_BOOTSTRAP_ADMIN_PASSWORD
            - name: CONTROL_PLANE_STARTUP_SELF_TEST_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_STARTUP_SELF_TEST_ENABLED
            - name: CONTROL_PLANE_ACME_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_ACME_ENABLED
            - name: CONTROL_PLANE_ACME_USE_DEVELOPMENT_CLIENT
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_ACME_USE_DEVELOPMENT_CLIENT
            - name: CONTROL_PLANE_ACME_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_ACME_EMAIL
            - name: CONTROL_PLANE_ACME_DIRECTORY_URL
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: CONTROL_PLANE_ACME_DIRECTORY_URL
            - name: WAF_RUNTIME_ROOT
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: WAF_RUNTIME_ROOT
            - name: WAF_RUNTIME_HEALTH_URL
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: WAF_RUNTIME_HEALTH_URL
            - name: WAF_RUNTIME_RELOAD_URL
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: WAF_RUNTIME_RELOAD_URL
            - name: WAF_RUNTIME_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: WAF_RUNTIME_API_TOKEN
            - name: CONTROL_PLANE_SECURITY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: CONTROL_PLANE_SECURITY_PEPPER
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: POSTGRES_DSN
            - name: OPENSEARCH_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: OPENSEARCH_ENDPOINT
            - name: OPENSEARCH_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: OPENSEARCH_USERNAME
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tarinio-lab-secrets
                  key: OPENSEARCH_PASSWORD
            - name: OPENSEARCH_INDEX_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: OPENSEARCH_INDEX_PREFIX
            - name: VAULT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: tarinio-lab-config
                  key: VAULT_ENABLED
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: waf-runtime-data
              mountPath: /var/lib/waf
      volumes:
        - name: waf-runtime-data
          persistentVolumeClaim:
            claimName: waf-runtime-data
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8080
      targetPort: 8080

services:
  k3s:
    image: rancher/k3s:v1.30.6-k3s1
    restart: unless-stopped
    privileged: true
    command:
      - server
      - --write-kubeconfig-mode
      - "644"
      - --tls-san
      - k3s
    environment:
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "666"
    volumes:
      - waf-k3s-data:/var/lib/rancher/k3s
      - waf-k3s-output:/output
    expose:
      - "80"
      - "443"
      - "6443"
    healthcheck:
      test: ["CMD-SHELL", "k3s kubectl get nodes >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 20
    networks:
      - waf-net

volumes:
  waf-k3s-data:
    name: ${WAF_STACK_NAME:-waf}-k3s-data
  waf-k3s-output:
    name: ${WAF_STACK_NAME:-waf}-k3s-output

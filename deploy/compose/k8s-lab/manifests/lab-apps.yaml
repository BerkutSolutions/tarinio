apiVersion: v1
kind: Namespace
metadata:
  name: waf-k8s-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-a
  namespace: waf-k8s-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site-a
  template:
    metadata:
      labels:
        app: site-a
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=K8S-LAB SITE A: example.com"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: site-a
  namespace: waf-k8s-lab
spec:
  selector:
    app: site-a
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-b
  namespace: waf-k8s-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site-b
  template:
    metadata:
      labels:
        app: site-b
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=K8S-LAB SITE B: domen.example.com"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: site-b
  namespace: waf-k8s-lab
spec:
  selector:
    app: site-b
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-c
  namespace: waf-k8s-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site-c
  template:
    metadata:
      labels:
        app: site-c
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=K8S-LAB SITE C: ex.example.com"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: site-c
  namespace: waf-k8s-lab
spec:
  selector:
    app: site-c
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waf-k8s-lab-ingress
  namespace: waf-k8s-lab
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site-a
                port:
                  number: 80
    - host: domen.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site-b
                port:
                  number: 80
    - host: ex.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site-c
                port:
                  number: 80

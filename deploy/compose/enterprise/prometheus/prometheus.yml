global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tarinio-control-plane
    metrics_path: /metrics
    params:
      token: ["ha-lab-metrics"]
    static_configs:
      - targets:
          - control-plane-a:8080
          - control-plane-b:8080

  - job_name: tarinio-runtime
    metrics_path: /metrics
    params:
      token: ["ha-lab-runtime-metrics"]
    static_configs:
      - targets:
          - runtime:8081

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

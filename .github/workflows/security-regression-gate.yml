name: security-regression-gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 2"

jobs:
  pci-perimeter-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      WAF_STACK_NAME: gha-pci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare compose env
        shell: bash
        run: |
          cp deploy/compose/auto-start/.env.example deploy/compose/auto-start/.env
          cat >> deploy/compose/auto-start/.env <<'EOF'
          POSTGRES_PASSWORD=waf
          POSTGRES_DSN=postgres://waf:waf@postgres:5432/waf?sslmode=disable
          CONTROL_PLANE_SECURITY_PEPPER=security-regression-security-pepper
          WAF_RUNTIME_API_TOKEN=security-regression-runtime-api-token
          CONTROL_PLANE_BOOTSTRAP_ADMIN_ENABLED=true
          CONTROL_PLANE_BOOTSTRAP_ADMIN_ID=admin
          CONTROL_PLANE_BOOTSTRAP_ADMIN_USERNAME=admin
          CONTROL_PLANE_BOOTSTRAP_ADMIN_EMAIL=admin@example.test
          CONTROL_PLANE_BOOTSTRAP_ADMIN_PASSWORD=admin
          CONTROL_PLANE_ACME_ENABLED=false
          CONTROL_PLANE_ACME_USE_DEVELOPMENT_CLIENT=true
          CONTROL_PLANE_DEV_FAST_START_ENABLED=true
          CONTROL_PLANE_DEV_FAST_START_HOST=localhost
          CONTROL_PLANE_DEV_FAST_START_CERTIFICATE_ID=control-plane-localhost-tls
          CONTROL_PLANE_DEV_FAST_START_MANAGEMENT_SITE_ID=control-plane-access
          CONTROL_PLANE_DEV_FAST_START_UPSTREAM_HOST=ui
          CONTROL_PLANE_DEV_FAST_START_UPSTREAM_PORT=80
          EOF

      - name: Cleanup previous stack state
        shell: bash
        run: docker compose -f deploy/compose/auto-start/docker-compose.yml down -v --remove-orphans || true

      - name: Start stack
        shell: bash
        run: docker compose -f deploy/compose/auto-start/docker-compose.yml up -d --build

      - name: Wait for runtime edge
        shell: bash
        run: |
          browser_ua='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'
          for i in $(seq 1 80); do
            if curl -kfsS -A "$browser_ua" --resolve localhost:443:127.0.0.1 https://localhost/login >/dev/null 2>&1; then
              exit 0
            fi
            if curl -kfsS -A "$browser_ua" --resolve localhost:443:127.0.0.1 https://localhost/challenge >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "runtime edge did not become ready in time"
          curl -kI -A "$browser_ua" --resolve localhost:443:127.0.0.1 https://localhost/login || true
          curl -kI -A "$browser_ua" --resolve localhost:443:127.0.0.1 https://localhost/challenge || true
          docker compose -f deploy/compose/auto-start/docker-compose.yml ps
          exit 1

      - name: Run PCI perimeter preflight (fail-fast)
        shell: bash
        env:
          TARGET_HOST: localhost
          TARGET_HTTP_PORT: "80"
          TARGET_HTTPS_PORT: "443"
          TARGET_RESOLVE_IP: 127.0.0.1
          EXPECTED_OPEN_PORTS: 80,443
          PORT_PROBE_SET: 80,443,8080,8443,9200
          EXPECT_HSTS_PRELOAD: "0"
          COMPLIANCE_POLICY_FILE: security/compliance/deprecated-controls-policy.json
          OUT_BASE_DIR: /tmp
        run: |
          export EXPECTED_TCP_TIMESTAMPS="$(cat /proc/sys/net/ipv4/tcp_timestamps 2>/dev/null || echo 1)"
          chmod +x scripts/pci-preflight-perimeter.sh
          ./scripts/pci-preflight-perimeter.sh

      - name: Collect preflight artifacts
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/.last-pci-preflight-artifact ]]; then
            cat /tmp/.last-pci-preflight-artifact > /tmp/pci-preflight-artifact-dir.txt
            artifact_dir="$(cat /tmp/.last-pci-preflight-artifact)"
            if [[ -d "$artifact_dir" ]]; then
              mkdir -p build/ci-artifacts
              cp -R "$artifact_dir" "build/ci-artifacts/pci-preflight"
            fi
          fi
          test -d build/ci-artifacts/pci-preflight || mkdir -p build/ci-artifacts/pci-preflight
          if [[ -f /tmp/pci-preflight-artifact-dir.txt ]]; then
            cp /tmp/pci-preflight-artifact-dir.txt build/ci-artifacts/pci-preflight/artifact-dir.txt
          fi

      - name: Upload preflight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-perimeter-preflight-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/ci-artifacts/pci-preflight
          if-no-files-found: warn

      - name: Dump compose logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f deploy/compose/auto-start/docker-compose.yml ps
          docker compose -f deploy/compose/auto-start/docker-compose.yml logs --no-color

      - name: Stop stack
        if: always()
        shell: bash
        run: docker compose -f deploy/compose/auto-start/docker-compose.yml down -v --remove-orphans

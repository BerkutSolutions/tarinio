stages:
  - validate
  - unit
  - e2e
  - security

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

default:
  tags:
    - waf-secure
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  GIT_DEPTH: "0"
  GOTOOLCHAIN: auto
  GOCACHE: /home/gitlab-runner/.cache/tarinio/go-build
  GOMODCACHE: /home/gitlab-runner/.cache/tarinio/go-mod
  NPM_CACHE_DIR: /home/gitlab-runner/.cache/tarinio/npm
  TRIVY_CACHE_DIR: /home/gitlab-runner/.cache/tarinio/trivy

validate:repository:
  stage: validate
  timeout: 10m
  script:
    - git diff --check
    - sh -n scripts/install-aio.sh
    - sh -n scripts/install-aio-enterprise.sh
    - test -f go.mod
    - test -f package-lock.json
    - grep -q '^RUN GOTOOLCHAIN=auto go test ./ui/tests$' ui/Dockerfile

warm:e2e-images:
  stage: validate
  timeout: 20m
  script:
    - |
      set -eu
      for image in postgres:15 hashicorp/vault:1.18 ealen/echo-server:latest; do
        if docker image inspect "$image" >/dev/null 2>&1; then
          echo "[ci] E2E base image is cached: $image"
        else
          echo "[ci] Pulling required E2E base image: $image"
          docker pull "$image"
        fi
      done

unit:go:
  stage: unit
  timeout: 35m
  script:
    - mkdir -p .ci-bin .ci-home "$NPM_CACHE_DIR"
    - |
      cat > .ci-bin/npm <<'EOF'
      #!/bin/sh
      set -eu
      exec docker run --rm --pull=always --user "$(id -u):$(id -g)" \
        -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache \
        -v "$NPM_CACHE_DIR:/npm-cache" \
        -v "$PWD:/workspace" -w /workspace node:24-bookworm npm "$@"
      EOF
    - chmod 700 .ci-bin/npm
    - export PATH="$CI_PROJECT_DIR/.ci-bin:$PATH"
    - go version
    - go vet ./...
    - go test ./... -count=1
    - go mod verify

docs:build:
  stage: unit
  timeout: 30m
  script:
    - mkdir -p "$NPM_CACHE_DIR" .ci-home
    - >-
      docker run --rm --pull=always --user "$(id -u):$(id -g)"
      -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache
      -v "$NPM_CACHE_DIR:/npm-cache"
      -v "$CI_PROJECT_DIR:/workspace" -w /workspace node:24-bookworm
      bash -lc 'npm ci --prefer-offline --no-audit --fund=false && npm run docs:build'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/

e2e:full:
  stage: e2e
  timeout: 45m
  resource_group: waf-e2e-stack
  dependencies: []
  retry:
    max: 1
    when:
      - script_failure
  script:
    - mkdir -p build/e2e/full
    - E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/full" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - build/e2e/full/

e2e:fresh-onboarding:
  stage: e2e
  timeout: 30m
  resource_group: waf-e2e-stack
  dependencies: []
  retry:
    max: 1
    when:
      - script_failure
  script:
    - mkdir -p build/e2e/fresh-onboarding
    - >-
      E2E_FRESH_ONBOARDING=1
      E2E_FILTER=TestE2EFreshOnboardingSelfSignedTLS
      E2E_TIMEOUT=240
      E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/fresh-onboarding"
      sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - build/e2e/fresh-onboarding/

security:gitleaks:
  stage: security
  timeout: 20m
  dependencies: []
  script:
    - mkdir -p build/security
    - >-
      docker run --rm --pull=always
      -v "$CI_PROJECT_DIR:/repo" -w /repo
      zricethezav/gitleaks:v8.30.0
      detect --source /repo
      --redact --report-format json --report-path /repo/build/security/gitleaks.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/security/gitleaks.json

security:trivy:
  stage: security
  timeout: 35m
  dependencies: []
  script:
    - mkdir -p build/security "$TRIVY_CACHE_DIR"
    - >-
      docker run --rm --pull=always
      -v "$CI_PROJECT_DIR:/src" -v "$TRIVY_CACHE_DIR:/root/.cache/trivy"
      aquasec/trivy:0.66.0 fs --scanners vuln,misconfig,secret
      --skip-dirs .git --severity HIGH,CRITICAL --exit-code 1
      --format json --output /src/build/security/trivy-fs.json /src
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/security/trivy-fs.json

security:govulncheck:
  stage: security
  timeout: 30m
  dependencies: []
  script:
    - mkdir -p .bin
    - GOBIN="$CI_PROJECT_DIR/.bin" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
    - .bin/govulncheck ./...

security:npm-audit:
  stage: security
  timeout: 25m
  dependencies: []
  script:
    - mkdir -p "$NPM_CACHE_DIR" .ci-home
    - >-
      docker run --rm --pull=always --user "$(id -u):$(id -g)"
      -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache
      -v "$NPM_CACHE_DIR:/npm-cache"
      -v "$CI_PROJECT_DIR:/workspace" -w /workspace node:24-bookworm
      bash -lc 'npm ci --prefer-offline --no-audit --fund=false && npm audit --omit=dev --audit-level=moderate'

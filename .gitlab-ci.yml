stages:
  - validate
  - unit
  - e2e-smoke
  - e2e
  - security
  - dast
  - publish

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

default:
  tags:
    - waf-secure
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  GIT_DEPTH: "0"
  GOTOOLCHAIN: auto
  GOCACHE: /home/gitlab-runner/.cache/tarinio/go-build
  GOMODCACHE: /home/gitlab-runner/.cache/tarinio/go-mod
  NPM_CACHE_DIR: /home/gitlab-runner/.cache/tarinio/npm
  TRIVY_CACHE_DIR: /home/gitlab-runner/.cache/tarinio/trivy

validate:repository:
  stage: validate
  timeout: 10m
  script:
    - git diff --check
    - sh -n scripts/install-aio.sh
    - sh -n scripts/install-aio-enterprise.sh
    - test -f go.mod
    - test -f package-lock.json
    - grep -q '^RUN GOTOOLCHAIN=auto go test ./ui/tests$' ui/Dockerfile

warm:e2e-images:
  stage: validate
  timeout: 20m
  script:
    - |
      set -eu
      for image in postgres:15 hashicorp/vault:1.18 ealen/echo-server:latest ghcr.io/zaproxy/zaproxy:stable; do
        if docker image inspect "$image" >/dev/null 2>&1; then
          echo "[ci] E2E base image is cached: $image"
        else
          echo "[ci] Pulling required E2E base image: $image"
          docker pull "$image"
        fi
      done

unit:go:
  stage: unit
  timeout: 35m
  script:
    - mkdir -p .ci-bin .ci-home "$NPM_CACHE_DIR"
    - |
      cat > .ci-bin/npm <<'EOF'
      #!/bin/sh
      set -eu
      repo_dir="$(pwd -P)"
      exec docker run --rm --pull=always --user "$(id -u):$(id -g)" \
        -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache \
        -v "$NPM_CACHE_DIR:/npm-cache" \
        -v "$repo_dir:/workspace" -w /workspace node:24-bookworm npm "$@"
      EOF
    - chmod 700 .ci-bin/npm
    - export PATH="$CI_PROJECT_DIR/.ci-bin:$PATH"
    - go version
    - go vet ./...
    - go test ./... -count=1
    - go mod verify

docs:build:
  stage: unit
  timeout: 30m
  script:
    - mkdir -p "$NPM_CACHE_DIR" .ci-home
    - >-
      docker run --rm --pull=always --user "$(id -u):$(id -g)"
      -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache
      -v "$NPM_CACHE_DIR:/npm-cache"
      -v "$CI_PROJECT_DIR:/workspace" -w /workspace node:24-bookworm
      bash -lc 'npm ci --prefer-offline --no-audit --fund=false && npm run docs:build'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/

e2e:smoke:
  stage: e2e-smoke
  timeout: 30m
  resource_group: waf-e2e-stack
  dependencies: []
  script:
    - mkdir -p build/e2e/smoke
    - E2E_FILTER='TestE2ESmoke_LoginHealthcheckDashboard|TestE2EAntibotChallengePrecedesActiveRateLimitFallback|TestE2EBasicAuthLifecycle|TestE2EModSecurity_EnableDisableReenableWithScopedExclusion|TestE2EDashboardAttackPopulationConsistency' E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/smoke" E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/e2e/smoke" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - build/e2e/smoke/

e2e:security-invariants:
  stage: e2e
  timeout: 35m
  resource_group: waf-e2e-stack
  dependencies: []
  script:
    - mkdir -p build/e2e/security-invariants
    - >-
      E2E_FILTER='TestE2EBasicAuthLifecycle|TestE2EMultisiteBasicAuthIsolation|TestE2ESecurityModesReality|TestE2ERequestStorageParity|TestE2EDashboardAttackPopulationConsistency|TestE2EAntibotChallengePrecedesActiveRateLimitFallback|TestE2EManagementModSecuritySafeguardKeepsAppPingAvailable|TestE2EAdminPanelModSecurityBypassesEveryAdministrativeRoute|TestE2EModSecurity_EnableDisableReenableWithScopedExclusion|TestE2ERecoveryFlow_BadConfigThenRepair|TestE2ERecovery_InvalidCandidateDoesNotReplaceActiveProtection|TestE2ESecurityInvariant_PasswordChangeRevokesOtherSessionAndRecordsLogin|TestE2EServiceEditorParity|TestE2ESecurityAndTLSMatrix/RBACNegativeMatrix$|TestE2ETOTPStepUpProtectsCertificateExportAndLocksFailures|TestE2EBehavioral_CustomErrorPages_GeoAndDirectRuntimeBranches/TrustedProxyIdentityRejectsSpoofedForwardedFor$'
      E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/security-invariants"
      E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/e2e/security-invariants" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/e2e/security-invariants/

e2e:management-rate-limit:
  stage: e2e
  timeout: 30m
  resource_group: waf-e2e-stack
  dependencies: []
  needs:
    - e2e:smoke
  script:
    - mkdir -p build/e2e/management-rate-limit
    - E2E_FILTER=TestE2EManagementHostIsExcludedFromGlobalL7RateLimit E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/management-rate-limit" E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/e2e/management-rate-limit" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/e2e/management-rate-limit/

e2e:full:
  stage: e2e
  timeout: 45m
  resource_group: waf-e2e-stack
  dependencies: []
  needs:
    - e2e:smoke
  script:
    - mkdir -p build/e2e/full
    - E2E_FILTER='TestE2EAntibotTemplates/(TemplatePreviewRendering|TemplatesContainVerifyURI|TemplateSwitchSavesAndCompiles)$|TestE2EBasicAuthTemplates|TestE2ECompilerRuntimeAuthContract|TestE2EErrorPages|TestE2EBehavioral_CustomErrorPages_GeoAndDirectRuntimeBranches|TestE2EL4L7AdaptiveProtection|TestE2ESecurityAndTLSMatrix|TestE2ERecoveryFlow_BadConfigThenRepair|TestE2EMultisiteBasicAuthIsolation' E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/full" E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/e2e/full" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/e2e/full/

e2e:nightly:
  stage: e2e
  timeout: 60m
  resource_group: waf-e2e-stack
  dependencies: []
  rules:
    - when: never
  script:
    - mkdir -p build/e2e/nightly
    - WAF_E2E_RESILIENCE=1 WAF_E2E_VERIFY_DECAY=1 E2E_FILTER='TestE2EL4L7AdaptiveProtection|TestE2ESecurityModesReality|TestE2ERecoveryFlow_BadConfigThenRepair|TestE2ENegativeSecurityProbes|TestE2EBurstStability' E2E_TIMEOUT=300 E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/nightly" E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/e2e/nightly" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/e2e/nightly/

validate:generated-nginx-config:
  stage: e2e-smoke
  timeout: 15m
  dependencies: []
  script:
    - go test ./compiler/internal/compiler -run 'TestSyntaxRunner|TestRenderEasyArtifacts|TestRenderSiteUpstreamArtifacts' -count=1

e2e:fresh-onboarding:
  stage: e2e
  timeout: 30m
  resource_group: waf-e2e-stack
  dependencies: []
  script:
    - mkdir -p build/e2e/fresh-onboarding
    - >-
      E2E_FRESH_ONBOARDING=1
      E2E_FILTER=TestFreshOnboardingSelfSignedTLS
      E2E_TIMEOUT=240
      E2E_LOG_DIR="$CI_PROJECT_DIR/build/e2e/fresh-onboarding"
      sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - build/e2e/fresh-onboarding/

security:gitleaks:
  stage: security
  timeout: 20m
  dependencies: []
  script:
    - mkdir -p build/security
    - >-
      docker run --rm --pull=always
      -v "$CI_PROJECT_DIR:/repo" -w /repo
      zricethezav/gitleaks:v8.30.0
      detect --config /repo/.gitleaks.toml --source /repo
      --redact --report-format json --report-path /repo/build/security/gitleaks.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/security/gitleaks.json

security:trivy:
  stage: security
  timeout: 35m
  dependencies: []
  script:
    - mkdir -p build/security "$TRIVY_CACHE_DIR"
    - >-
      docker run --rm --pull=always
      -v "$CI_PROJECT_DIR:/src" -v "$TRIVY_CACHE_DIR:/root/.cache/trivy"
      aquasec/trivy:0.66.0 fs --scanners vuln,misconfig,secret
      --skip-dirs .git --severity HIGH,CRITICAL --exit-code 0
      --format json --output /src/build/security/trivy-fs.json /src
    - node scripts/verify-trivy-baseline.mjs build/security/trivy-fs.json security/trivy-baseline.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/security/trivy-fs.json

security:trivy-image:
  stage: security
  timeout: 35m
  dependencies: []
  script:
    - mkdir -p build/security "$TRIVY_CACHE_DIR"
    - docker build -t tarinio-ci-security-scan:$CI_COMMIT_SHA -f control-plane/Dockerfile .
    - >-
      docker run --rm --pull=always
      -v /var/run/docker.sock:/var/run/docker.sock
      -v "$TRIVY_CACHE_DIR:/root/.cache/trivy"
      -v "$CI_PROJECT_DIR:/src"
      aquasec/trivy:0.66.0 image --scanners vuln --severity HIGH,CRITICAL
      --exit-code 1 --format json --output /src/build/security/trivy-image.json tarinio-ci-security-scan:$CI_COMMIT_SHA
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/security/trivy-image.json

security:govulncheck:
  stage: security
  timeout: 30m
  dependencies: []
  script:
    - mkdir -p .bin
    - GOTOOLCHAIN=go1.26.5 GOBIN="$CI_PROJECT_DIR/.bin" go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
    - .bin/govulncheck ./...

security:npm-audit:
  stage: security
  timeout: 25m
  dependencies: []
  script:
    - mkdir -p "$NPM_CACHE_DIR" .ci-home
    - >-
      docker run --rm --pull=always --user "$(id -u):$(id -g)"
      -e HOME=/workspace/.ci-home -e NPM_CONFIG_CACHE=/npm-cache
      -v "$NPM_CACHE_DIR:/npm-cache"
      -v "$CI_PROJECT_DIR:/workspace" -w /workspace node:24-bookworm
      bash -lc 'npm ci --prefer-offline --no-audit --fund=false && npm audit --omit=dev --audit-level=moderate'

dast:baseline:
  stage: dast
  timeout: 40m
  resource_group: waf-e2e-stack
  dependencies: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - mkdir -p build/dast/baseline
    - DAST_OUTPUT_DIR="$CI_PROJECT_DIR/build/dast/baseline" sh scripts/run-dast-scan.sh baseline
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dast/baseline/

dast:negative:
  stage: dast
  timeout: 35m
  resource_group: waf-e2e-stack
  dependencies: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - mkdir -p build/dast/negative
    - E2E_FILTER='TestE2ENegativeSecurityProbes|TestE2EDASTAuthenticatedControlPlane|TestE2EDASTSecurityHeadersAndSessionCookie|TestE2EDASTAPIInputFuzz' E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/dast/negative" E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/dast/negative" sh scripts/run-e2e-tests.sh
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dast/negative/

dast:full:
  stage: dast
  timeout: 60m
  resource_group: waf-e2e-stack
  dependencies: []
  rules:
    - when: never
  script:
    - mkdir -p build/dast/full
    - DAST_OUTPUT_DIR="$CI_PROJECT_DIR/build/dast/full" sh scripts/run-dast-scan.sh full
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dast/full/

publish:github-mirror:
  stage: publish
  timeout: 15m
  dependencies: []
  needs:
    - validate:repository
    - warm:e2e-images
    - unit:go
    - docs:build
    - e2e:smoke
    - validate:generated-nginx-config
    - e2e:security-invariants
    - e2e:management-rate-limit
    - e2e:full
    - e2e:fresh-onboarding
    - security:gitleaks
    - security:trivy
    - security:trivy-image
    - security:govulncheck
    - security:npm-audit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      allow_failure: false
    - when: never
  script:
    - |
      set -eu
      test -n "${GITHUB_TOKEN:-}" || { echo "GITHUB_TOKEN is required for GitHub mirroring" >&2; exit 1; }
      askpass="$CI_PROJECT_DIR/.git-askpass"
      trap 'rm -f "$askpass"' EXIT
      cat > "$askpass" <<'EOF'
      #!/bin/sh
      case "$1" in
        *Username*) printf '%s\n' x-access-token ;;
        *) printf '%s\n' "$GITHUB_TOKEN" ;;
      esac
      EOF
      chmod 700 "$askpass"
      GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
        git push "https://github.com/BerkutSolutions/tarinio.git" HEAD:main

publish:github-release:
  stage: publish
  timeout: 45m
  dependencies:
    - security:trivy
    - security:trivy-image
    - e2e:smoke
    - e2e:security-invariants
    - e2e:management-rate-limit
    - e2e:full
    - dast:baseline
    - dast:negative
  needs:
    - publish:github-mirror
    - validate:repository
    - warm:e2e-images
    - unit:go
    - docs:build
    - e2e:smoke
    - validate:generated-nginx-config
    - e2e:security-invariants
    - e2e:management-rate-limit
    - e2e:full
    - e2e:fresh-onboarding
    - security:gitleaks
    - security:trivy
    - security:trivy-image
    - security:govulncheck
    - security:npm-audit
    - dast:baseline
    - dast:negative
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+/'
      allow_failure: false
    - if: '$CI_COMMIT_BRANCH == "main"'
      allow_failure: false
    - when: never
  script:
    - |
      set -eu
      test -n "${GITHUB_TOKEN:-}" || { echo "GITHUB_TOKEN is required for GitHub publishing" >&2; exit 1; }
      test -n "${RELEASE_SIGNING_PRIVATE_KEY_B64:-}" || { echo "RELEASE_SIGNING_PRIVATE_KEY_B64 is required for signed release artifacts" >&2; exit 1; }
      test -n "${RELEASE_SIGNING_PUBLIC_KEY_B64:-}" || { echo "RELEASE_SIGNING_PUBLIC_KEY_B64 is required for release verification" >&2; exit 1; }
      app_version="$(sed -n 's/^var AppVersion = "\(.*\)"/\1/p' control-plane/internal/appmeta/meta.go | head -n1)"
      release_tag="${CI_COMMIT_TAG:-v$app_version}"
      version="${release_tag#v}"
      test "$version" = "$app_version" || { echo "tag $release_tag does not match AppVersion $app_version" >&2; exit 1; }
      mkdir -p .work/release-signing build/release/"$version"
      printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY_B64" | base64 -d > .work/release-signing/release-ed25519-private.pem
      printf '%s' "$RELEASE_SIGNING_PUBLIC_KEY_B64" | base64 -d > .work/release-signing/release-ed25519-public.pem
      chmod 600 .work/release-signing/release-ed25519-private.pem
      go run ./cmd/release-artifacts \
        -version "$version" \
        -commit "$CI_COMMIT_SHA" \
        -tag "$release_tag" \
        -output "build/release/$version" \
        -docker-tags "ghcr.io/berkutsolutions/tarinio:$version,ghcr.io/berkutsolutions/tarinio:latest"
      go run ./cmd/release-artifacts-verify -output "build/release/$version" -trusted-public-key .work/release-signing/release-ed25519-public.pem
      askpass="$CI_PROJECT_DIR/.git-askpass"
      export DOCKER_CONFIG="$CI_PROJECT_DIR/.docker-publish"
      trap 'rm -rf "$askpass" "$DOCKER_CONFIG" .work/release-signing/release-ed25519-private.pem .work/release-signing/release-ed25519-public.pem' EXIT
      cat > "$askpass" <<'EOF'
      #!/bin/sh
      case "$1" in
        *Username*) printf '%s\n' x-access-token ;;
        *) printf '%s\n' "$GITHUB_TOKEN" ;;
      esac
      EOF
      chmod 700 "$askpass"
      git config user.name "GitLab CI Release"
      git config user.email "gitlab-ci@berkutsolutions.local"
      if GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git ls-remote --exit-code --tags "https://github.com/BerkutSolutions/tarinio.git" "refs/tags/$release_tag" >/dev/null 2>&1; then
        remote_tag_sha="$(GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git ls-remote "https://github.com/BerkutSolutions/tarinio.git" "refs/tags/$release_tag^{}" | awk '{print $1}')"
        test "$remote_tag_sha" = "$CI_COMMIT_SHA" || { echo "GitHub tag $release_tag already points to another commit" >&2; exit 1; }
      else
        git tag -a "$release_tag" -m "Release $release_tag" "$CI_COMMIT_SHA"
      fi
      GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 \
        git push "https://github.com/BerkutSolutions/tarinio.git" "refs/tags/$release_tag"
      echo "[release] GitHub tag $release_tag is available"
      echo "[release] Building GitHub release notes from CHANGELOG.md"
      python3 scripts/extract-changelog-section.py \
        --changelog CHANGELOG.md \
        --version "$version" \
        --output "build/release/$version/github-release-notes.md"
      test -s "build/release/$version/github-release-notes.md"
      echo "[release] Collecting verified E2E and DAST evidence"
      python3 scripts/write-release-evidence.py \
        --e2e-root build/e2e \
        --dast-root build/dast \
        --trivy-report build/security/trivy-fs.json \
        --trivy-image-report build/security/trivy-image.json \
        --output-dir "build/release/$version" \
        --version "$version" \
        --commit "$CI_COMMIT_SHA"
      cat "build/release/$version/release-evidence-summary.md" >> "build/release/$version/github-release-notes.md"
      echo "[release] Authenticating with GHCR"
      printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u BerkutSolutions --password-stdin
      echo "[release] Building image ghcr.io/berkutsolutions/tarinio:$version"
      docker build -t "ghcr.io/berkutsolutions/tarinio:$version" -f control-plane/Dockerfile .
      echo "[release] Running image health check"
      docker rm -f tarinio-release-smoke >/dev/null 2>&1 || true
      smoke_port=18082
      docker run -d --rm --name tarinio-release-smoke -e CONTROL_PLANE_SECURITY_PEPPER=release-smoke-pepper -p "127.0.0.1:$smoke_port:8080" "ghcr.io/berkutsolutions/tarinio:$version"
      i=0; until curl -fsS "http://127.0.0.1:$smoke_port/healthz" >/dev/null; do i=$((i + 1)); test "$i" -lt 30 || { docker logs tarinio-release-smoke; exit 1; }; sleep 1; done
      docker rm -f tarinio-release-smoke >/dev/null
      docker tag "ghcr.io/berkutsolutions/tarinio:$version" "ghcr.io/berkutsolutions/tarinio:latest"
      echo "[release] Publishing versioned GHCR image"
      docker push "ghcr.io/berkutsolutions/tarinio:$version"
      echo "[release] Publishing latest GHCR image"
      docker push "ghcr.io/berkutsolutions/tarinio:latest"
      echo "[release] Creating or updating GitHub Release"
      echo "[release] Uploading signed release and verification evidence"
      python3 scripts/publish-github-release.py \
        --repo BerkutSolutions/tarinio \
        --tag "$release_tag" \
        --title "TARINIO $version" \
        --notes "build/release/$version/github-release-notes.md" \
        --asset "build/release/$version/release-manifest.json" \
        --asset "build/release/$version/signature.json" \
        --asset "build/release/$version/sbom.cdx.json" \
        --asset "build/release/$version/provenance.json" \
        --asset "build/release/$version/checksums.txt" \
        --asset "build/release/$version/release-evidence.md" \
        --asset "build/release/$version/release-evidence.json" \
        --asset "build/release/$version/release-evidence-summary.md" \
        --asset "build/release/$version/release-evidence-source.zip"
        --asset "build/release/$version/trivy-fs.json"
        --asset "build/release/$version/trivy-image.json"
  artifacts:
    expire_in: 30 days
    paths:
      - build/release/

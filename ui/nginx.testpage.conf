limit_req_zone $binary_remote_addr zone=ui_login_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    absolute_redirect off;
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index login.html;

    location = / {
        return 302 /login;
    }

    location = /onboarding {
        limit_req zone=ui_login_limit burst=20 nodelay;
        try_files /onboarding.html =404;
    }

    location ~ ^/onboarding/(user-creation|site-tls|confirm)$ {
        try_files /onboarding.html =404;
    }

    location = /login {
        limit_req zone=ui_login_limit burst=20 nodelay;
        try_files /login.html =404;
    }

    location = /login/2fa {
        limit_req zone=ui_login_limit burst=20 nodelay;
        try_files /login-2fa.html =404;
    }

    location = /healthcheck {
        try_files /healthcheck.html =404;
    }

    location ~ ^/(dashboard|sites|services|anti-ddos|tls|requests|revisions|events|bans|jobs|administration|activity|settings|about|profile)$ {
        try_files /index.html =404;
    }

    location = /onboarding.html {
        return 302 /onboarding/user-creation;
    }

    location = /login.html {
        return 302 /login;
    }

    location = /login-2fa.html {
        return 302 /login/2fa;
    }

    location /api/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow fc00::/7;
        deny all;

        set $api_upstream http://control-plane:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api-app/sites {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/sites/sites.json;
    }

    location = /api-app/upstreams {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/upstreams/upstreams.json;
    }

    location = /api-app/tls-configs {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/tlsconfigs/tls_configs.json;
    }

    location = /api-app/access-policies {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/accesspolicies/access_policies.json;
    }

    location = /api-app/events {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/events/events.json;
    }

    location = /api-app/easy-site-profiles {
        default_type application/json;
        alias /var/lib/waf/control-plane-app/easysiteprofiles/easy_site_profiles.json;
    }

    location = /api/requests {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow fc00::/7;
        deny all;

        set $api_upstream http://control-plane:8080;
        proxy_pass $api_upstream/api/requests;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api-app/ {
        set $api_app_upstream http://control-plane-test:8080;
        rewrite ^/api-app/(.*)$ /api/$1 break;
        proxy_pass $api_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location /static/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        etag off;
        try_files $uri =404;
    }

    location / {
        limit_req zone=ui_login_limit burst=25 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.html;
    }
}


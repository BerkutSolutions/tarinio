<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAF Admin</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: radial-gradient(circle at top, #142744 0%, #050b18 60%, #030711 100%); color: #e8eefc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .waf-fallback-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
    .waf-fallback-card { width: min(560px, 100%); border: 1px solid #294d7f; border-radius: 14px; background: linear-gradient(180deg, #12233d, #0a1529); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.38); padding: 22px; }
    .waf-fallback-title { margin: 0; font-size: 24px; font-weight: 700; }
    .waf-fallback-sub { margin: 10px 0 0; font-size: 14px; color: #afc3e7; }
    .waf-fallback-badge { display: inline-block; margin-top: 14px; padding: 4px 10px; border-radius: 999px; border: 1px solid #365f95; background: #0d1c34; color: #b4cbef; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
    .waf-fallback-hint { margin-top: 14px; font-size: 13px; color: #93add8; }
  </style>
  <script>
    (function () {
      function toCode(input) {
        var value = Number(input || 0);
        if (value === 403 || value === 429) return value;
        return 429;
      }
      function renderBlocked(opts) {
        if (window.__wafBlockedRendered) return;
        window.__wafBlockedRendered = true;
        var code = toCode(opts && opts.code);
        var title = code === 403 ? "403 Доступ ограничен" : "429 Слишком много запросов";
        var text = code === 403
          ? "Доступ временно ограничен защитой WAF/Anti-DDoS."
          : "Сработала защита от флуда. Подождите, пока завершится окно блокировки.";
        document.body.innerHTML = '<div class="waf-fallback-wrap"><article class="waf-fallback-card"><h1 class="waf-fallback-title">' + title + '</h1><p class="waf-fallback-sub">' + text + '</p><span class="waf-fallback-badge">Защита активна</span><p class="waf-fallback-hint">Пока блокировка активна, основной интерфейс не отображается.</p></article></div>';
      }
      window.__wafRenderBlocked = renderBlocked;
      window.__wafMarkBoot = function () { window.__wafBootOk = true; };
      window.addEventListener("error", function (event) {
        var target = event && event.target;
        if (!target) return;
        var tag = String(target.tagName || "").toLowerCase();
        if (tag !== "link" && tag !== "script" && tag !== "img") return;
        var source = String(target.href || target.src || "");
        if (source.indexOf("/static/") >= 0) {
          renderBlocked({ code: 429 });
        }
      }, true);
      // Control-plane API does not expose /api/auth/session. We call /api/auth/me here to detect
      // WAF blocking (403/429) during initial load while allowing 401 for unauthenticated users.
      fetch("/api/auth/me", { credentials: "include", cache: "no-store", headers: { Accept: "application/json" } })
        .then(function (response) {
          if (response.status === 403 || response.status === 429) {
            renderBlocked({ code: response.status });
          }
        })
        .catch(function () {});
    })();
  </script>
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/static/favicon64.png">
  <link rel="stylesheet" href="/static/styles.css?v=20260402-ui-fixes-2" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })">
  <link rel="stylesheet" href="/static/waf.css?v=20260402-ui-fixes-2" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img class="sidebar-logo-collapsed no-select" src="/static/logo512.png" alt="" aria-hidden="true">
        <div class="brand-text no-select">
          <div class="brand-title" data-i18n="app.brandTitle">Berkut Solutions</div>
          <div class="brand-subtitle" data-i18n="app.brandSubtitle">Tarinio</div>
        </div>
        <button id="sidebar-toggle" class="sidebar-collapse-btn" type="button" data-i18n-aria-label="app.sidebarToggle" aria-label="Toggle sidebar" aria-expanded="true">
          <span aria-hidden="true">&gt;</span>
        </button>
        <div class="sidebar-header-actions">
          <button id="notifications-btn" class="icon-btn" type="button" data-i18n-title="app.notifications" title="Notifications">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M12 2a5 5 0 0 0-5 5v2.2c0 .7-.2 1.4-.6 2L4.7 14a1 1 0 0 0 .8 1.5h13a1 1 0 0 0 .8-1.5l-1.7-2.8c-.4-.6-.6-1.3-.6-2V7a5 5 0 0 0-5-5Zm0 20a3 3 0 0 0 2.8-2H9.2A3 3 0 0 0 12 22Z"/>
            </svg>
            <span id="notifications-btn-badge" class="sidebar-notify sidebar-notify-inline" hidden></span>
          </button>
          <div id="notifications-dropdown" class="notifications-dropdown" hidden>
            <div class="notifications-head">
              <strong data-i18n="app.notifications">Notifications</strong>
              <button id="notifications-clear-all" class="btn ghost btn-sm" type="button" data-i18n="app.notifications.clearAll">Clear all</button>
            </div>
            <div id="notifications-list" class="notifications-list"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-content">
        <nav id="menu" class="sidebar-nav"></nav>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-tools">
          <button id="profile-btn" class="icon-btn" type="button" data-i18n-title="profile.open" title="Profile">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5Z"/>
            </svg>
          </button>
          <button id="logout-btn" class="icon-btn" type="button" data-i18n-title="app.logout" title="Logout">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M5 3h8a2 2 0 0 1 2 2v3h-2V5H5v14h8v-3h2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm11.3 5.3L20 12l-3.7 3.7-1.4-1.4 1.3-1.3H9v-2h7.2l-1.3-1.3 1.4-1.4Z"/>
            </svg>
          </button>
        </div>
        <a id="app-update-badge" class="btn btn-sm primary app-update-link" hidden></a>
        <div id="app-version" class="muted app-version" data-i18n="app.version">v1.1.19</div>
      </div>
    </aside>
    <main id="content">
      <header class="app-header waf-app-header">
        <div>
          <h1 id="page-title"></h1>
          <div id="page-desc" class="muted"></div>
        </div>
        <div class="waf-header-actions">
          <span id="rbac-badge" class="badge badge-neutral">-</span>
        </div>
      </header>
      <section id="content-area"></section>
    </main>
  </div>

  <div id="app-toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="/static/js/app.js?v=20260402-ui-fixes-2" onload="window.__wafMarkBoot && window.__wafMarkBoot()" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })"></script>
</body>
</html>

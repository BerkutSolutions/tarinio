<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAF Admin | 2FA</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: radial-gradient(circle at top, #142744 0%, #050b18 60%, #030711 100%); color: #e8eefc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .waf-fallback-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
    .waf-fallback-card { width: min(560px, 100%); border: 1px solid #294d7f; border-radius: 14px; background: linear-gradient(180deg, #12233d, #0a1529); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.38); padding: 22px; }
    .waf-fallback-title { margin: 0; font-size: 24px; font-weight: 700; }
    .waf-fallback-sub { margin: 10px 0 0; font-size: 14px; color: #afc3e7; }
  </style>
  <script>
    (function () {
      function renderBlocked(code) {
        if (window.__wafBlockedRendered) return;
        window.__wafBlockedRendered = true;
        var status = Number(code || 429) === 403 ? 403 : 429;
        var title = status === 403 ? "403 Доступ ограничен" : "429 Слишком много запросов";
        document.body.innerHTML = '<div class="waf-fallback-wrap"><article class="waf-fallback-card"><h1 class="waf-fallback-title">' + title + '</h1><p class="waf-fallback-sub">Защита активна. Повторите попытку позже.</p></article></div>';
      }
      window.__wafRenderBlocked = function (opts) { renderBlocked(opts && opts.code); };
    })();
  </script>
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/static/favicon64.png">
  <link rel="stylesheet" href="/static/styles.css?v=20260419-profile-spacing-2" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })">
  <link rel="stylesheet" href="/static/waf.css?v=20260419-profile-spacing-2" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <img class="login-logo" src="/static/logo500x300.png" alt="Berkut Solutions - TARINIO" onerror="this.style.display='none'">
      <h1 data-i18n="login2fa.title">2FA confirmation</h1>
      <p class="muted" data-i18n="auth.2fa.pageTitle">Second factor confirmation</p>
      <div class="alert" id="login2fa-alert" hidden></div>
      <form id="login2fa-form" method="post" action="javascript:void(0)" novalidate>
        <p class="muted" id="login2fa-hint" data-i18n="auth.2fa.prompt">Second factor is required to continue.</p>
        <label for="twofa-code" data-i18n="auth.2fa.code">2FA code</label>
        <input id="twofa-code" name="otp" type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" autocapitalize="off" spellcheck="false" required>
        <label class="checkbox">
          <input type="checkbox" id="twofa-use-recovery">
          <span data-i18n="auth.2fa.useRecovery">Use recovery code</span>
        </label>
        <div class="form-actions">
          <button type="submit" class="btn primary" id="login2fa-submit" data-i18n="auth.2fa.submit">Confirm</button>
          <button type="button" class="btn ghost" id="login2fa-passkey-btn" data-i18n="auth.passkeys.useAs2FA" hidden>Use passkey</button>
          <button type="button" class="btn ghost" id="login2fa-back" data-i18n="common.back">Back</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="/static/js/login-2fa.js?v=20260418-v1-1-21-1" onerror="window.__wafRenderBlocked && window.__wafRenderBlocked({ code: 429 })"></script>
</body>
</html>

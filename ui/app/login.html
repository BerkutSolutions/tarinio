<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAF Admin | Login</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: radial-gradient(circle at top, #142744 0%, #050b18 60%, #030711 100%); color: #e8eefc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .waf-fallback-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
    .waf-fallback-card { width: min(560px, 100%); border: 1px solid #294d7f; border-radius: 14px; background: linear-gradient(180deg, #12233d, #0a1529); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.38); padding: 22px; }
    .waf-fallback-title { margin: 0; font-size: 24px; font-weight: 700; }
    .waf-fallback-sub { margin: 10px 0 0; font-size: 14px; color: #afc3e7; }
    .waf-fallback-badge { display: inline-block; margin-top: 14px; padding: 4px 10px; border-radius: 999px; border: 1px solid #365f95; background: #0d1c34; color: #b4cbef; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
    .waf-fallback-hint { margin-top: 14px; font-size: 13px; color: #93add8; }
  </style>
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/static/favicon64.png">
  <link rel="stylesheet" href="/static/styles.css?v=20260419-profile-spacing-2">
  <link rel="stylesheet" href="/static/waf.css?v=20260419-profile-spacing-2">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <img class="login-logo" src="/static/logo500x300.png" alt="Berkut Solutions - TARINIO" onerror="this.style.display='none'">
      <h1 data-i18n="login.title">Berkut Solutions - TARINIO</h1>
      <p class="muted" data-i18n="login.subtitle">Standalone control plane login</p>
      <div class="alert" id="login-alert" hidden></div>
      <form id="login-form" method="post" action="javascript:void(0)" novalidate>
        <label for="username" data-i18n="login.username">Username</label>
        <input id="username" name="username" autocomplete="username" required>
        <label for="password" data-i18n="login.password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit" class="btn primary" id="login-submit-btn" data-i18n="login.submit">Sign in</button>
        <button type="button" class="btn ghost" id="login-passkey-btn" data-i18n="auth.passkeys.loginBtn" hidden>Sign in with passkey</button>
        <button type="button" class="btn ghost" id="login-oidc-btn" data-i18n="login.oidc">Sign in with enterprise SSO</button>
      </form>
    </div>
  </div>
  <script type="module" src="/static/js/login.js?v=20260419-v2-0-2"></script>
</body>
</html>

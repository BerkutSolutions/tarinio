stages:
  - dast

default:
  tags:
    - waf-secure
  interruptible: true

variables:
  GIT_DEPTH: "0"
  GOTOOLCHAIN: auto
  GOCACHE: /home/gitlab-runner/.cache/tarinio/go-build
  GOMODCACHE: /home/gitlab-runner/.cache/tarinio/go-mod

.dast-artifacts:
  after_script:
    - docker compose -f deploy/compose/e2e/docker-compose.yml down --volumes --remove-orphans || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dast/

dast:baseline:
  extends: [.dast-artifacts]
  stage: dast
  timeout: 40m
  resource_group: waf-e2e-stack
  script:
    - mkdir -p build/dast/baseline
    - DAST_OUTPUT_DIR="$CI_PROJECT_DIR/build/dast/baseline" sh scripts/run-dast-scan.sh baseline

dast:enforcement:
  extends: [.dast-artifacts]
  stage: dast
  timeout: 35m
  resource_group: waf-e2e-stack
  script:
    - mkdir -p build/dast/enforcement
    - >-
      E2E_FILTER='TestE2ENegativeSecurityProbes|TestE2EDASTAuthenticatedControlPlane|TestE2EDASTSecurityHeadersAndSessionCookie'
      E2E_TIMEOUT=240 E2E_LOG_DIR="$CI_PROJECT_DIR/build/dast/enforcement"
      E2E_EVIDENCE_DIR="$CI_PROJECT_DIR/build/dast/enforcement" sh scripts/run-e2e-tests.sh
